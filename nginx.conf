# Nginx configuration for Pressly Design Studio.
# Place this file at: /etc/nginx/sites-available/pressly-design-studio
# Then symlink it: sudo ln -s /etc/nginx/sites-available/pressly-design-studio /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name presslydesign.com www.presslydesign.com;  # Replace with your real domain

    # Forward all traffic to Next.js running on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Required headers for WebSocket support and proper proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS block is added automatically by Certbot (Let's Encrypt) after you run:
# sudo certbot --nginx -d presslydesign.com -d www.presslydesign.com