# This workflow runs every time you push to the main branch.
# It SSHs into your Digital Ocean droplet and deploys the latest code.

name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}         # Your droplet's IP address
          username: ${{ secrets.DO_USERNAME }} # Usually 'root' or your server user
          key: ${{ secrets.DO_SSH_KEY }}       # Your private SSH key (added to GitHub Secrets)
          script: |
            # Navigate to the project folder on the server
            cd /var/www/pressly-design-studio

            # Pull the latest code from GitHub
            git pull origin main

            # Install dependencies (--production=false ensures devDeps are included for the build)
            npm ci --production=false

            # Build the Next.js app for production
            npm run build

            # Restart the app — PM2 keeps it running with the new build
            pm2 restart pressly-design-studio