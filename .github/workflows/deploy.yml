# This workflow runs every time you push to the main branch.
# It SSHs into your Digital Ocean droplet and deploys the latest code.

name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          fingerprint: ${{ secrets.DO_FINGERPRINT }}
          script: |
            # Navigate to the project folder on the server
            cd /var/www/pressly-design-studio

            # Discard any manual server-side changes before pulling
            git reset --hard HEAD
            git pull origin main

            # Install dependencies (--production=false ensures devDeps are included for the build)
            npm ci --production=false

            # Build the Next.js app for production
            npm run build

            # Start if not running, restart if already running
            pm2 startOrRestart ecosystem.config.js --update-env